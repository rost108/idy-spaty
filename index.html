<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Іди спати</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #0b0f1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f4f4f5;
    }
    h1 {
      font-size: clamp(2.5rem, 12vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      margin: 0;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    #horse {
      position: fixed;
      bottom: 8%;
      left: 0;
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      pointer-events: none;
      animation: gallop 9s linear infinite;
    }
    /* рух через екран зліва направо + легкі підстрибування */
    @keyframes gallop {
      0%   { transform: translateX(-15vw) translateY(0)     scaleX(-1); }
      25%  { transform: translateX(20vw)  translateY(-12px) scaleX(-1); }
      50%  { transform: translateX(55vw)  translateY(0)     scaleX(-1); }
      75%  { transform: translateX(90vw)  translateY(-12px) scaleX(-1); }
      100% { transform: translateX(115vw) translateY(0)     scaleX(-1); }
    }
    #lullaby {
      padding: 0.85rem 1.6rem;
      font-size: 1.05rem;
      color: #f4f4f5;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #lullaby:hover { background: rgba(255, 255, 255, 0.12); }
    #lullaby:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <h1>Іди спати 😴</h1>
  <button id="lullaby">🌙 Увімкнути колискову</button>
  <div id="horse">🐎</div>

  <script>
    // Ноти (Гц)
    const N = {
      C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
      G4: 392.00, A4: 440.00, B4: 493.88, C5: 523.25
    };

    // Мелодія "Сяй, зіронько" (Twinkle Twinkle) — [нота, тривалість у долях]
    const MELODY = [
      ['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],
      ['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2],
      ['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],
      ['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],
      ['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],
      ['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]
    ];

    const BEAT = 0.62;          // секунд на долю (повільно, заколисливо)
    const btn = document.getElementById('lullaby');
    let ctx = null, master = null, timer = null, playing = false;

    function playNote(freq, start, dur) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      // м'яка обвідка, щоб не було клацань
      const peak = 0.18;
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(peak, start + 0.08);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur * 0.95);
      osc.connect(g).connect(master);
      osc.start(start);
      osc.stop(start + dur);
    }

    function scheduleLoop() {
      let t = ctx.currentTime + 0.15;
      for (const [note, beats] of MELODY) {
        const dur = beats * BEAT;
        playNote(N[note], t, dur);
        t += dur;
      }
      const total = (t - ctx.currentTime) * 1000;
      timer = setTimeout(scheduleLoop, total - 50); // зациклити
    }

    function start() {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      master = ctx.createGain();
      master.gain.value = 0.9;
      master.connect(ctx.destination);
      scheduleLoop();
      playing = true;
      btn.textContent = '⏸ Вимкнути колискову';
    }

    function stop() {
      clearTimeout(timer);
      if (ctx) ctx.close();
      ctx = null;
      playing = false;
      btn.textContent = '🌙 Увімкнути колискову';
    }

    btn.addEventListener('click', () => playing ? stop() : start());
  </script>
</body>
</html>
