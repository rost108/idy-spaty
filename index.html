<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Іди спати</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0f1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f4f4f5;
    }
    h1 {
      font-size: clamp(2.5rem, 12vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
  </style>
</head>
<body>
  <h1>Іди спати 😴</h1>
</body>
</html>
